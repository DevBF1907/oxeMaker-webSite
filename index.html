<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ÔXE-MAKER-2026 | Vidas, Escolas e Comunidades</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Londrina+Solid:wght@300;400;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Space Mono', 'monospace'],
              logo: ['Londrina Solid', 'cursive'],
              display: ['Londrina Solid', 'cursive'],
            },
            colors: {
              oxe: {
                dark: '#050D34',
                primary: '#0030B5',
                blue: '#0030B5',
                accent: '#01B1FD',
                lightBlue: '#01B1FD',
                yellow: '#FCC140',
                neutral: '#1E292D',
                slate: '#1E292D',
                // Mapping legacy names to new palette for consistency
                orange: '#FCC140', // Yellow as accent/orange replacement
                green: '#01B1FD',  // Light blue as green replacement
                red: '#0030B5',    // Main blue as red replacement
                sand: '#fef3c7',
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #050D34;
        color: #ffffff;
        background-image: 
          linear-gradient(rgba(1, 177, 253, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(1, 177, 253, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
      }
      
      .maker-card {
        background: #1E292D;
        border: 2px solid #01B1FD;
        box-shadow: 4px 4px 0px #FCC140;
      }

      .maker-button {
        box-shadow: 0px 4px 0px #050D34;
        transition: all 0.1s;
        display: inline-block;
        cursor: pointer;
      }
      .maker-button:active {
        transform: translateY(2px);
        box-shadow: 0px 2px 0px #050D34;
      }

      @keyframes rotate-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-rotate { animation: rotate-slow 20s linear infinite; }
      
      .tape {
        background: #0030B5;
        transform: rotate(-2deg);
        padding: 2px 10px;
        font-family: 'Space Mono', monospace;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #050D34;
      }
      ::-webkit-scrollbar-thumb {
        background: #0030B5;
        border-radius: 5px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #01B1FD;
      }
    </style>
    
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@angular/common": "https://esm.sh/@angular/common@^21.1.4",
    "@angular/core": "https://esm.sh/@angular/core@^21.1.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
